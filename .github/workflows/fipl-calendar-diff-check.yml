name: FIPL Calendar Diff Check

on:
  schedule:
    - cron: "15 22 * * *" # every day at 10:15 PM
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-fipl-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check FIPL calendar updates from script output
        id: check_calendar
        run: |
          year="$(date -u +%Y)"
          output="$(node scripts/update-calendar.js fipl "$year")"

          if [ -z "$output" ]; then
            echo "No FIPL calendar updates detected."
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s' "$output" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{try{JSON.parse(s)}catch{console.error('update-calendar.js output is not valid JSON');process.exit(1)}})"

          echo "FIPL calendar updates detected."
          echo "has_updates=true" >> "$GITHUB_OUTPUT"
          echo "calendar_year=$year" >> "$GITHUB_OUTPUT"
          {
            echo "calendar_diff_json<<EOF"
            echo "$output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub issues for updates
        if: steps.check_calendar.outputs.has_updates == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const diff = JSON.parse(process.env.CALENDAR_DIFF_JSON);
            const federation = "fipl";
            const year = Number(process.env.CALENDAR_YEAR);
            const calendarPageUrl = `https://www.powerliftingitalia-fipl.it/calendario-gare.asp?anno=${year}`;
            const yearPrefix = String(year).slice(-2);
            const datasetDir = path.join(
              process.env.GITHUB_WORKSPACE,
              "tests",
              "dataset",
              federation,
            );

            const allMeets = [
              ...(diff.newMeetsWithResults || []),
              ...(diff.meetsThatGainedResults || []),
            ];

            function normalizeMeetName(value) {
              return String(value)
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9]+/g, " ")
                .trim();
            }

            function findExistingMeetFolder(meetName) {
              if (!fs.existsSync(datasetDir)) {
                return null;
              }

              const target = normalizeMeetName(meetName);
              if (!target) {
                return null;
              }

              for (const folder of fs.readdirSync(datasetDir)) {
                if (!/^\d{4}$/.test(folder) || !folder.startsWith(yearPrefix)) {
                  continue;
                }

                const meetCsvPath = path.join(datasetDir, folder, "meet.csv");
                if (!fs.existsSync(meetCsvPath)) {
                  continue;
                }

                const meetCsv = fs.readFileSync(meetCsvPath, "utf8");
                const dataLine =
                  meetCsv.split(/\r?\n/).find((line) => /^FIPL,/i.test(line)) ?? "";
                const meetNameFromCsv = dataLine.split(",").slice(5).join(",").trim();
                const existing = normalizeMeetName(meetNameFromCsv);
                if (!existing) {
                  continue;
                }

                if (
                  existing === target ||
                  existing.includes(target) ||
                  target.includes(existing)
                ) {
                  return folder;
                }
              }

              return null;
            }

            function maxExistingMeetSuffix() {
              if (!fs.existsSync(datasetDir)) {
                return 0;
              }

              let max = 0;
              for (const folder of fs.readdirSync(datasetDir)) {
                if (!/^\d{4}$/.test(folder) || !folder.startsWith(yearPrefix)) {
                  continue;
                }
                const suffix = Number(folder.slice(2));
                if (Number.isFinite(suffix)) {
                  max = Math.max(max, suffix);
                }
              }
              return max;
            }

            function buildMeetFolderByMeetId(meets) {
              const sorted = [...meets].sort((a, b) => a.id - b.id);
              let nextSuffix = maxExistingMeetSuffix();
              const folderByMeetId = new Map();

              for (const meet of sorted) {
                const existingFolder = findExistingMeetFolder(meet.name);
                const folderId =
                  existingFolder ??
                  `${yearPrefix}${String((nextSuffix += 1)).padStart(2, "0")}`;
                folderByMeetId.set(meet.id, folderId);
              }

              return folderByMeetId;
            }

            const meetFolderByMeetId = buildMeetFolderByMeetId(allMeets);
            const importCommandByMeetId = new Map(
              [...meetFolderByMeetId.entries()].map(([meetId, folderId]) => [
                meetId,
                `npm run import-calendar-meet ${federation} ${year} ${meetId} tests/dataset/${federation}/${folderId}`,
              ]),
            );
            const generateCommandByMeetId = new Map(
              [...meetFolderByMeetId.entries()].map(([meetId, folderId]) => [
                meetId,
                `npx @labarilem/opl-tools generate ${federation} ${year} ${meetId} meet-data/${federation}/${folderId}`,
              ]),
            );

            const meetsByDate = new Map();
            for (const meet of allMeets) {
              if (!meet || typeof meet.date !== "string" || meet.date.trim() === "") {
                continue;
              }
              const date = meet.date.trim();
              if (!meetsByDate.has(date)) {
                meetsByDate.set(date, []);
              }
              meetsByDate.get(date).push(meet);
            }

            const { owner, repo } = context.repo;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const openTitles = new Set(openIssues.map((issue) => issue.title));

            for (const [meetDate, meets] of meetsByDate.entries()) {
              const title = `Update fipl calendar ${meetDate}`;
              if (openTitles.has(title)) {
                core.info(`Skipping duplicate issue: ${title}`);
                continue;
              }

              const importCommands = meets.map((meet) =>
                importCommandByMeetId.get(meet.id),
              );
              const generateCommands = meets.map((meet) =>
                generateCommandByMeetId.get(meet.id),
              );
              const updateCalendarCommand = `npm run update-calendar ${federation} ${year}`;
              const body = [
                "Daily FIPL calendar check detected updates for this date.",
                "",
                `Federation calendar: ${calendarPageUrl}`,
                `Workflow run: https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
                "",
                "Detected meets:",
                ...meets.map((meet) => `- ${meet.name} (id: ${meet.id})`),
                "",
                "Update the federation calendar (run from the repository root):",
                "```bash",
                updateCalendarCommand,
                "```",
                "",
                "Import meets into the test dataset (run from the repository root):",
                "```bash",
                ...importCommands,
                "```",
                "",
                "Generate OPL data files for the official openpowerlifting repo (run from the opl-data repository root):",
                "",
                "To automatically generate OPL data files for FIPL meets you can use the @labarilem/opl-tools NPM package.",
                "Requirements: Node.js and NPM must be installed on your system. Guide: https://docs.npmjs.com/downloading-and-installing-node-js-and-npm",
                "Usage: npx @labarilem/opl-tools generate <federation> <year> <meetId> <outputDir> [--isOpenDivision <true|false>]",
                `Example: npx @labarilem/opl-tools generate fipl ${year} 8 meet-data/fipl/${yearPrefix}08`,
                "Docs: https://www.npmjs.com/package/@labarilem/opl-tools",
                "Source code: https://github.com/labarilem/openpowerlifting-tools",
                "",
                "```bash",
                ...generateCommands,
                "```",
                "",
                "Raw diff JSON:",
                "```json",
                JSON.stringify(diff, null, 2),
                "```",
              ].join("\n");

              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              openTitles.add(title);
              core.info(`Created issue: ${title}`);
            }
        env:
          CALENDAR_DIFF_JSON: ${{ steps.check_calendar.outputs.calendar_diff_json }}
          CALENDAR_YEAR: ${{ steps.check_calendar.outputs.calendar_year }}
